server:
  port: 8082

spring:
  application:
    name: job-analyzer-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: analyzer-group
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: jobEvent:com.ailab.analyzer.event.JobCreatedEvent

# LangChain4j Ollama config
langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: llama3

# LocalStack AWS Configuration
aws:
  region: us-east-1
  endpoint: http://localhost:4566
  access-key: test
  secret-key: test
  s3:
    bucket-name: target-jd-bucket
  dynamodb:
    table-name: global-job-metadata

logging:
  level:
    com.ailab: DEBUG
    dev.langchain4j: DEBUG
